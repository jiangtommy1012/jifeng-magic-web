name = "jifeng-magic-web"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[observability]
enabled = true

# D1 database binding - create with:
#   wrangler d1 create magic-market-db
# then paste the returned database_id below.
# [[d1_databases]]
# binding = "DB"
# database_name = "magic-market-db"
# database_id = "REPLACE_ME"

# KV namespace binding - create with:
#   wrangler kv namespace create CACHE
# then paste the returned id below.
# [[kv_namespaces]]
# binding = "CACHE"
# id = "REPLACE_ME"

# Cron trigger for scheduled scraping (Layer 1) - runs every 6 hours.
# Uncomment once the scheduled handler is implemented.
# [triggers]
# crons = ["0 */6 * * *"]
